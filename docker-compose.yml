version: "3.9"

services:

  # ─── HDFS NameNode ────────────────────────────────────────────────────────
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870"   # Web UI + WebHDFS
      - "8020:8020"   # RPC
    environment:
      CLUSTER_NAME: bluesky-hadoop
    env_file:
      - hadoop.env
    volumes:
      - namenode_data:/hadoop/dfs/name
    networks:
      - hadoop-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─── HDFS DataNode 1 ──────────────────────────────────────────────────────
  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode1
    hostname: datanode1
    ports:
      - "9864:9864"
    env_file:
      - hadoop.env
    volumes:
      - datanode1_data:/hadoop/dfs/data
    networks:
      - hadoop-net
    depends_on:
      namenode:
        condition: service_healthy
    restart: unless-stopped

  # ─── HDFS DataNode 2 ──────────────────────────────────────────────────────
  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode2
    hostname: datanode2
    ports:
      - "9865:9864"
    env_file:
      - hadoop.env
    volumes:
      - datanode2_data:/hadoop/dfs/data
    networks:
      - hadoop-net
    depends_on:
      namenode:
        condition: service_healthy
    restart: unless-stopped

  # ─── Bluesky Bridge (WebSocket → TCP) ─────────────────────────────────────
  bluesky-bridge:
    build: ./bridge
    container_name: bluesky-bridge
    hostname: bluesky-bridge
    networks:
      - hadoop-net
    ports:
      - "9999:9999"   # optional (for debugging)
    restart: unless-stopped

  # ─── HDFS Collector (TCP → HDFS) ──────────────────────────────────────────
  hdfs-collector:
    build: ./collector
    container_name: hdfs-collector
    hostname: hdfs-collector
    environment:
      BRIDGE_HOST: bluesky-bridge
      BRIDGE_PORT: "9999"
      HDFS_HOST: namenode
      HDFS_PORT: "9870"
      HDFS_DIR: /bluesky/raw
      FLUSH_EVERY: "50"
    networks:
      - hadoop-net
    depends_on:
      namenode:
        condition: service_healthy
      bluesky-bridge:
        condition: service_started
    restart: unless-stopped
  # ─── Spark Master ────────────────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    hostname: spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080"
    networks:
      - hadoop-net

  # ─── Spark Worker ────────────────────────────────────────────────────────
  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    hostname: spark-worker
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    networks:
      - hadoop-net

  # ─── Spark Streaming Job ─────────────────────────────────────────────────
  spark-app:
    build: ./spark
    container_name: spark-app
    depends_on:
      - spark-master
      - namenode
    volumes:
      - ./hadoop-config:/opt/hadoop/etc/hadoop
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
    networks:
      - hadoop-net
# ─── Volumes ────────────────────────────────────────────────────────────────
volumes:
  namenode_data:
  datanode1_data:
  datanode2_data:

# ─── Network ────────────────────────────────────────────────────────────────
networks:
  hadoop-net:
    driver: bridge